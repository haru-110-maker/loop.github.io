<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loop Breaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E7E5DD;
    --plate:#F1EFE8;
    --panel:#F1EFE8;     /* alias kept for existing selectors */
    --ink:#1E1C18;
    --ink-soft:#6F6B61;
    --line:#1E1C18;
    --night:#18202E;     /* 土台パネルの夜色 */
    --night-2:#222D3F;
    --star:#ECE6D6;
    --flow:#BC8E3E;      /* 進行中：金のまたたく星 */
    --rest:#73829A;      /* 寝かせ中：くすんだ青 */
    --settled:#1E1C18;   /* 決着：インク */
    --gutter:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Zen Kaku Gothic New",sans-serif;
    line-height:1.6;
    padding:16px;
    max-width:560px;margin:0 auto;
    /* subtle paper grain */
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.022) 1px, transparent 0);
    background-size:4px 4px;
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  /* ── north star anchor ── */
  .anchor{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px}
  .anchor svg{width:62px;height:62px}
  .ns-core{fill:var(--ink)}
  .ns-tick{stroke:var(--ink);stroke-width:1;opacity:.45}
  .ns-ring{fill:none;stroke:var(--ink);stroke-width:.6;opacity:.22}
  @keyframes breathe{0%,100%{opacity:.45}50%{opacity:.16}}
  .ns-tick{animation:breathe 6s ease-in-out infinite}

  /* ── header ── */
  header{text-align:center;padding:2px 0 18px}
  .date{font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:14px;letter-spacing:.14em;color:var(--ink-soft)}
  h1{font-family:"Shippori Mincho",serif;font-weight:600;font-size:22px;
    letter-spacing:.04em;margin:3px 0 5px}
  .sub{font-size:12px;color:var(--ink-soft);letter-spacing:.03em}

  /* ── data io (書き出し / 読み込み) ── */
  .io{display:flex;gap:16px;justify-content:center;align-items:center;
    padding:0 2px 18px}
  .io button{background:none;border:none;cursor:pointer;color:var(--ink-soft);
    font-family:"Zen Kaku Gothic New";font-size:11px;letter-spacing:.1em;
    padding:2px 0;border-bottom:1px solid rgba(30,28,24,.28)}
  .io button:active{color:var(--ink)}

  /* ── eyebrow (Cormorant italic + small JP label + hairline) ── */
  .eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:500;
    font-size:15px;letter-spacing:.06em;color:var(--ink-soft);
    display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .eyebrow .jp{font-family:"Zen Kaku Gothic New";font-style:normal;font-size:10px;
    font-weight:700;letter-spacing:.2em;text-transform:none}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line);opacity:.22}

  /* ── generic plate ── */
  .panel{background:var(--plate);border:1.5px solid var(--line);
    border-radius:2px;padding:15px 15px 13px;margin-bottom:18px}

  /* ── compass (北極星) ── */
  .compass .row{display:flex;gap:11px;align-items:flex-start;padding:8px 0;
    border-bottom:1px dotted rgba(30,28,24,.18)}
  .compass .row:last-child{border-bottom:none;padding-bottom:1px}
  .compass .star4{flex:0 0 auto;margin-top:5px}
  .compass .tag{font-size:10.5px;font-weight:700;color:var(--ink-soft);
    min-width:30px;margin-top:3px;letter-spacing:.05em}
  .compass .aim{font-family:"Shippori Mincho",serif;font-size:14.5px;line-height:1.55;flex:1}
  .quiet-add{background:none;border:none;cursor:pointer;
    font-family:"Zen Kaku Gothic New";font-size:11px;color:var(--ink-soft);
    letter-spacing:.04em;padding:9px 0 1px;margin-top:4px}
  .quiet-add:active{color:var(--ink)}

  /* ── lens filter ── */
  .lens{display:flex;gap:7px;overflow-x:auto;padding:1px 1px 13px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .lens::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-size:11.5px;font-weight:500;
    border:1.2px solid var(--line);background:transparent;color:var(--ink);
    padding:5px 13px;border-radius:20px;cursor:pointer;letter-spacing:.05em;
    transition:background .15s,color .15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--plate)}

  /* ── star catalog (worries) ── */
  .worries{background:var(--plate);border:1.5px solid var(--line);border-radius:2px;
    overflow:hidden;margin-bottom:9px}
  .worry{display:grid;grid-template-columns:30px 1fr auto;gap:10px;
    padding:14px 14px 13px;border-bottom:1px solid rgba(30,28,24,.13);
    align-items:start;animation:rise .4s ease both}
  .worry:last-child{border-bottom:none}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .glyph{width:24px;height:24px;margin-top:1px}
  @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.62}}
  .worry.flow .glyph{animation:twinkle 3.6s ease-in-out infinite}
  .worry .text{font-family:"Shippori Mincho",serif;font-size:15.5px;line-height:1.5;
    letter-spacing:.01em;cursor:text}
  .worry .act{font-size:12.5px;color:var(--ink);margin-top:6px;
    display:flex;gap:6px;align-items:baseline}
  .act .arrow{color:var(--ink-soft);flex:0 0 auto}
  .act .what{color:var(--ink);flex:1}
  .act .what.empty{color:var(--ink-soft);font-style:italic}
  .meta{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
  .cat{font-size:9.5px;color:var(--ink-soft);border:1px solid rgba(30,28,24,.22);
    padding:1px 7px;border-radius:9px;letter-spacing:.06em}
  .state{flex:0 0 auto;font-family:"Zen Kaku Gothic New";font-size:10px;font-weight:700;
    letter-spacing:.07em;padding:3px 8px;border-radius:2px;color:#fff;cursor:pointer;
    white-space:nowrap;user-select:none;-webkit-user-select:none;margin-top:1px}
  .s-flow{background:var(--flow)}
  .s-rest{background:var(--rest)}
  .s-settled{background:var(--settled)}
  .empty-note{font-family:"Shippori Mincho",serif;font-size:13px;color:var(--ink-soft);
    text-align:center;padding:22px 14px}

  /* resting: recedes, peaceful */
  .worry.rest{opacity:.78}
  .worry.rest .text{color:var(--ink-soft)}
  .worry.rest .act,.worry.rest .act .what{color:var(--ink-soft);font-style:normal}
  /* settled: quiet, kept as proof */
  .worry.settled{opacity:.66}
  .worry.settled .text{text-decoration:line-through;text-decoration-color:rgba(30,28,24,.3)}

  /* ── add bar ── */
  .add-cats{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:0 2px 9px;margin-top:14px}
  .add-cats .ac-label{font-size:11px;color:var(--ink-soft);letter-spacing:.1em;margin-right:1px}
  .cat-pick{padding:4px 12px;font-size:11.5px}
  .add{display:flex;gap:8px;margin:2px 0 6px}
  .add input{flex:1;font-family:"Shippori Mincho",serif;font-size:14px;
    border:1.2px dashed var(--line);background:transparent;border-radius:2px;
    padding:11px 12px;color:var(--ink)}
  .add input::placeholder{color:var(--ink-soft);font-style:normal}
  .add input:focus{outline:2px solid var(--flow);outline-offset:1px}
  .add button{font-family:"Zen Kaku Gothic New";font-weight:700;font-size:12.5px;
    border:1.5px solid var(--line);background:var(--ink);color:var(--plate);
    border-radius:2px;padding:0 15px;cursor:pointer}
  .hint{font-size:10.5px;color:var(--ink-soft);text-align:center;margin:3px 0 24px;
    letter-spacing:.03em;line-height:1.7}

  /* ── night plate (foundation constellation) ── */
  .foundation{background:var(--night);border:1.5px solid var(--ink);border-radius:2px;
    padding:16px 16px 14px;color:var(--star);position:relative;overflow:hidden;margin-bottom:18px}
  .foundation .eyebrow{color:rgba(236,230,214,.6)}
  .foundation .eyebrow::after{background:var(--star);opacity:.25}
  .foundation .eyebrow .jp{color:rgba(236,230,214,.5)}
  .sky-sub{font-size:9.5px;letter-spacing:.16em;color:rgba(236,230,214,.45);
    margin:4px 0 8px;text-transform:uppercase}
  .starlist{list-style:none;margin:0 0 2px}
  .srow{display:flex;align-items:baseline;gap:11px;padding:7px 2px;
    border-bottom:1px solid rgba(236,230,214,.09);animation:fadein .45s ease both}
  .srow:last-child{border-bottom:none}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .srow .sg{flex:0 0 18px;display:flex;justify-content:center;padding-top:2px}
  .srow .sn{font-family:"Shippori Mincho",serif;font-size:14px;line-height:1.5;
    color:rgba(236,230,214,.9);letter-spacing:.01em}
  .srow.bright .sn{font-size:15.5px;color:var(--star)}
  .srow.fresh .sn{color:var(--star)}
  .divider{height:1px;background:rgba(236,230,214,.18);margin:11px 0 9px}
  .foundation .close{font-family:"Cormorant Garamond",serif;font-style:italic;
    font-weight:300;font-size:14px;color:rgba(236,230,214,.6);text-align:right;
    margin-top:8px;letter-spacing:.05em}
  @keyframes shimmer{0%,100%{opacity:.92}50%{opacity:.55}}
  .twinkle-star{animation:shimmer 4.5s ease-in-out infinite}
  .found-add{display:flex;gap:8px;margin-top:13px}
  .found-add input{flex:1;font-family:"Shippori Mincho",serif;font-size:14px;
    border:1px dashed rgba(236,230,214,.32);background:transparent;border-radius:2px;
    padding:9px 11px;color:var(--star)}
  .found-add input::placeholder{color:rgba(236,230,214,.45);font-style:normal}
  .found-add input:focus{outline:1.5px solid var(--flow);outline-offset:1px}
  .found-add button{font-family:"Zen Kaku Gothic New";font-weight:700;font-size:13px;
    border:none;background:var(--star);color:var(--ink);
    border-radius:2px;padding:0 14px;cursor:pointer}

  /* ── inline editing & long-press feel ── */
  .worry .text,.compass .row,.foundation li{
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
    touch-action:manipulation}
  .state,.chip,.what{touch-action:manipulation}
  .editing{background:rgba(188,142,62,.1);box-shadow:inset 0 0 0 1.5px var(--flow);
    border-radius:2px;outline:none;cursor:text;
    -webkit-user-select:text!important;user-select:text!important}
  .foundation .editing{background:rgba(236,230,214,.1);
    box-shadow:inset 0 0 0 1.5px var(--star)}

  footer{text-align:center;font-size:10px;color:var(--ink-soft);
    padding:22px 0 8px;letter-spacing:.08em}
  footer span{font-family:"Cormorant Garamond",serif;font-style:italic}
</style>
</head>
<body>

<!-- north star anchor -->
<div class="anchor">
  <svg viewBox="0 0 80 80" aria-hidden="true">
    <circle class="ns-ring" cx="40" cy="40" r="30"/>
    <g class="ns-tick">
      <line x1="40" y1="6" x2="40" y2="16"/><line x1="40" y1="64" x2="40" y2="74"/>
      <line x1="6" y1="40" x2="16" y2="40"/><line x1="64" y1="40" x2="74" y2="40"/>
      <line x1="16" y1="16" x2="23" y2="23"/><line x1="57" y1="57" x2="64" y2="64"/>
      <line x1="64" y1="16" x2="57" y2="23"/><line x1="23" y1="57" x2="16" y2="64"/>
    </g>
    <path class="ns-core" d="M40 22 C42 36 44 38 58 40 C44 42 42 44 40 58 C38 44 36 42 22 40 C36 38 38 36 40 22 Z"/>
  </svg>
</div>

<header>
  <div class="date" id="today">—</div>
  <h1>ループ防止ダッシュボード</h1>
  <div class="sub">いまの頭の中をすべてここに降ろす。</div>
</header>

<div class="io">
  <button id="exportBtn">書き出し</button>
  <button id="importBtn">読み込み</button>
  <input type="file" id="importFile" accept="application/json,.json" hidden>
</div>

<!-- 北極星 / compass -->
<section class="panel compass">
  <div class="eyebrow">Polaris<span class="jp">北極星 ・ どこへ向かうか</span></div>
  <div id="compass"></div>
  <button class="quiet-add" id="compassAdd">＋ 北極星を足す</button>
</section>

<!-- lens -->
<div class="eyebrow">In the sky now<span class="jp">いま抱えていること ・ レンズで絞る</span></div>
<div class="lens" id="lens">
  <button class="chip" data-cat="all" aria-pressed="true">すべて</button>
  <button class="chip" data-cat="仕事" aria-pressed="false">仕事</button>
  <button class="chip" data-cat="創作" aria-pressed="false">創作</button>
  <button class="chip" data-cat="家庭" aria-pressed="false">家庭</button>
  <button class="chip" data-cat="自分" aria-pressed="false">自分</button>
</div>

<div class="worries" id="worries"></div>

<div class="add-cats" id="addCats">
  <span class="ac-label">分類</span>
  <button class="chip cat-pick" data-cat="仕事" aria-pressed="false">仕事</button>
  <button class="chip cat-pick" data-cat="創作" aria-pressed="false">創作</button>
  <button class="chip cat-pick" data-cat="家庭" aria-pressed="false">家庭</button>
  <button class="chip cat-pick" data-cat="自分" aria-pressed="false">自分</button>
</div>
<div class="add">
  <input id="newWorry" type="text" placeholder="いま浮かんでること を放り込む（分類は任意）" aria-label="新しい悩みを追加">
  <button id="addBtn">降ろす</button>
</div>
<div class="hint">状態の星をタップ → 進行中（金）⇄ 寝かせ中（眠る）⇄ 決着（星座へ）<br>本文・アクションはタップで編集 ・ 長押しで削除</div>

<!-- 土台 / foundation -->
<section class="panel foundation">
  <div class="eyebrow">Asterism<span class="jp">これまで積み上げてきたもの</span></div>
  <div id="joinedWrap"></div>
  <ul id="foundation" class="starlist"></ul>
  <div class="close">— 辛くなったらここを見て！</div>
  <div class="found-add">
    <input id="newFound" type="text" placeholder="＋ 積み上げを足す" aria-label="積み上げを追加">
    <button id="foundAddBtn">足す</button>
  </div>
</section>

<footer><span>Static Signal.</span> ・ loop breaker</footer>

<script>
  // ── constants ──
  const STORE_KEY="loop-dashboard-v1";
  const STATES=["flow","rest","settled"];
  const LABEL={flow:"進行中",rest:"寝かせ中",settled:"決着"};
  const REST_TEXT="今は寝かせる。抱えておくだけでいい";

  // ── today (computed, not stored) ──
  (function(){
    const d=new Date();
    const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    document.getElementById("today").textContent=
      d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" · "+days[d.getDay()];
  })();

  // ── default seed (used only when storage is empty) ──
  function defaultData(){
    return {
      version:1,
      compass:[
        {tag:"仕事", aim:"復職後は短時間＋リモートを軸に、自分のペースを守る"},
        {tag:"創作", aim:"MOE を仕上げて、世に出す"},
        {tag:"自分", aim:"焦らず、絵が上手くなっていく"},
      ],
      worries:[
        {text:"絵が上手くなりたい", state:"flow", act:"毎日ひとつ、落書きを残す", cats:["創作","自分"]},
        {text:"MOE の後半でテンポが詰まる", state:"flow", act:"次に描く場面から、まず一コマ手をつける", cats:["創作"]},
        {text:"上長との面談で、働き方をどう切り出すか", state:"flow", act:"短時間・リモートの希望を「一文」にして先に決めておく", cats:["仕事"]},
        {text:"将来が、漠然と不安", state:"rest", act:"", cats:["自分"]},
        {text:"夜のワンオペがしんどい日がある", state:"rest", act:"", cats:["家庭","自分"]},
      ],
      foundation:[
        "『一等星の孤独』130p 完成・BOOTH で頒布",
        "リワーク 9–16 を継続中",
        "MOE 線画完了 → 仕上げへ",
        "Python で hoikuen.py を自作",
        "サークルを Static Signal. として育てている",
      ],
    };
  }

  // ── normalize any loaded/imported object into the canonical shape ──
  function normalize(p){
    p=p||{};
    return {
      version:1,
      compass: Array.isArray(p.compass)
        ? p.compass.map(c=>({tag:String((c&&c.tag)||""), aim:String((c&&c.aim)||"")}))
        : [],
      worries: Array.isArray(p.worries)
        ? p.worries.map(w=>({
            text:String((w&&w.text)||""),
            state:(w&&STATES.includes(w.state))?w.state:"rest",
            act:String((w&&w.act)||""),
            cats:Array.isArray(w&&w.cats)?w.cats.map(String):[],
            settledAt:(w&&typeof w.settledAt==="number"&&isFinite(w.settledAt))?w.settledAt:null
          }))
        : [],
      foundation: Array.isArray(p.foundation) ? p.foundation.map(String) : [],
    };
  }

  // ── persistence ──
  function save(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
    catch(e){ /* storage unavailable: keep working in-memory */ }
  }
  function load(){
    try{
      const raw=localStorage.getItem(STORE_KEY);
      if(raw){
        const p=JSON.parse(raw);
        if(p && p.version===1) return normalize(p);
      }
    }catch(e){}
    return normalize(defaultData());
  }

  // ── state ──
  const CATS=["仕事","創作","家庭","自分"];
  let data=load();
  let filter="all";
  let pickedCats=new Set();   // categories chosen for the next new worry

  // ── helpers ──
  function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  function vibrate(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

  // ── star glyphs (display only) ──
  function glyph(state){
    if(state==="flow") return '<svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><path fill="#BC8E3E" d="M12 1.5 C13.2 9 15 10.8 22.5 12 C15 13.2 13.2 15 12 22.5 C10.8 15 9 13.2 1.5 12 C9 10.8 10.8 9 12 1.5 Z"/></svg>';
    if(state==="rest") return '<svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="6" fill="none" stroke="#73829A" stroke-width="1.6"/></svg>';
    return '<svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><path fill="#1E1C18" d="M12 2 C13 9 15 11 22 12 C15 13 13 15 12 22 C11 15 9 13 2 12 C9 11 11 9 12 2 Z"/><line x1="20" y1="12" x2="24" y2="12" stroke="#1E1C18" stroke-width="1.2"/></svg>';
  }
  function starSvg(bright){
    if(bright) return '<svg class="twinkle-star" width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9.5" fill="none" stroke="#ECE6D6" stroke-width=".5" opacity=".4"/><path fill="#ECE6D6" d="M12 2 C13.2 9 15 10.8 22 12 C15 13.2 13.2 15 12 22 C10.8 15 9 13.2 2 12 C9 10.8 10.8 9 12 2 Z"/></svg>';
    return '<svg width="11" height="11" viewBox="0 0 24 24" aria-hidden="true"><path fill="#ECE6D6" d="M12 3 C13 9.5 14.5 11 21 12 C14.5 13 13 14.5 12 21 C11 14.5 9.5 13 3 12 C9.5 11 11 9.5 12 3 Z"/></svg>';
  }

  let lastLongPress=0;
  function recentLong(){ return Date.now()-lastLongPress<500; }

  // long-press: fires once after the finger is held still long enough
  function onLongPress(el, handler, ms){
    ms=ms||550;
    let timer=null, sx=0, sy=0;
    const clear=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
    el.addEventListener("pointerdown",e=>{
      if(el.isContentEditable) return;
      sx=e.clientX; sy=e.clientY;
      clear();
      timer=setTimeout(()=>{ timer=null; lastLongPress=Date.now(); vibrate(18); handler(); }, ms);
    });
    el.addEventListener("pointermove",e=>{
      if(timer && (Math.abs(e.clientX-sx)>10 || Math.abs(e.clientY-sy)>10)) clear();
    });
    el.addEventListener("pointerup",clear);
    el.addEventListener("pointercancel",clear);
    el.addEventListener("pointerleave",clear);
    el.addEventListener("contextmenu",e=>e.preventDefault());
  }

  // tap-to-edit any text element in place; commit(value) is called on save
  function editInline(el, current, commit){
    if(el.isContentEditable) return;
    el.classList.add("editing");
    el.contentEditable="true";
    el.spellcheck=false;
    el.textContent=current;
    el.focus();
    try{
      const r=document.createRange(); r.selectNodeContents(el); r.collapse(false);
      const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
    }catch(e){}
    let done=false;
    const finish=(keep)=>{
      if(done) return; done=true;
      el.removeEventListener("blur",onBlur);
      el.removeEventListener("keydown",onKey);
      el.contentEditable="false";
      el.classList.remove("editing");
      if(keep) commit(el.textContent.trim());
      renderAll();
    };
    const onBlur=()=>finish(true);
    const onKey=e=>{
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); finish(true); }
      else if(e.key==="Escape"){ e.preventDefault(); finish(false); }
    };
    el.addEventListener("blur",onBlur);
    el.addEventListener("keydown",onKey);
  }

  // ── render: compass ──
  function renderCompass(){
    const box=document.getElementById("compass");
    box.innerHTML="";
    data.compass.forEach((c,i)=>{
      const row=document.createElement("div");
      row.className="row";
      row.innerHTML=
        `<svg class="star4" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><path fill="#1E1C18" d="M12 2 C13 9 15 11 22 12 C15 13 13 15 12 22 C11 15 9 13 2 12 C9 11 11 9 12 2 Z"/></svg>`+
        `<span class="tag" role="button" tabindex="0">${escapeHtml(c.tag)}</span>`+
        `<span class="aim" role="button" tabindex="0">${escapeHtml(c.aim)}</span>`;
      box.appendChild(row);
      onLongPress(row, ()=>deleteCompass(i));
      const tagEl=row.querySelector(".tag");
      const aimEl=row.querySelector(".aim");
      tagEl.addEventListener("click",()=>{ if(recentLong())return; editInline(tagEl, data.compass[i].tag, v=>{ if(v){ data.compass[i].tag=v; save(); } }); });
      aimEl.addEventListener("click",()=>{ if(recentLong())return; editInline(aimEl, data.compass[i].aim, v=>{ if(v){ data.compass[i].aim=v; save(); } }); });
    });
  }
  function deleteCompass(i){
    const c=data.compass[i]; if(!c) return;
    if(confirm("北極星「"+c.tag+"」を削除する？")){ data.compass.splice(i,1); save(); renderCompass(); }
  }
  function addCompass(){
    data.compass.push({tag:"新", aim:""});
    save(); renderCompass();
    // drop straight into editing the aim of the new row
    const aims=document.querySelectorAll("#compass .aim");
    const last=aims[aims.length-1];
    if(last) editInline(last, "", v=>{ data.compass[data.compass.length-1].aim=v; save(); });
  }

  // ── render: worries (star catalog) ──
  function renderWorries(){
    const box=document.getElementById("worries");
    box.innerHTML="";
    const items=[];
    data.worries.forEach((w,i)=>{ if(filter==="all"||(w.cats||[]).includes(filter)) items.push([w,i]); });
    if(items.length===0){
      box.innerHTML='<div class="empty-note">このレンズの空には、いま星が出ていない。</div>';
      return;
    }
    items.forEach(([w,i])=>{
      const card=document.createElement("div");
      card.className="worry "+w.state;
      const cats=(w.cats||[]).map(c=>`<span class="cat">${escapeHtml(c)}</span>`).join("");
      const resting=w.state==="rest";
      const hasAct=(w.act||"").trim().length>0;
      const actEmpty=!resting && !hasAct;
      const actShown=resting ? REST_TEXT : (hasAct ? w.act : "アクションを書く");
      card.innerHTML=
        glyph(w.state)+
        `<div class="body">`+
          `<div class="text" role="button" tabindex="0">${escapeHtml(w.text)}</div>`+
          `<div class="act"><span class="arrow">→</span><span class="what${actEmpty?' empty':''}" role="button" tabindex="0">${escapeHtml(actShown)}</span></div>`+
          `<div class="meta">${cats}</div>`+
        `</div>`+
        `<div class="state s-${w.state}" role="button" tabindex="0">${LABEL[w.state]}</div>`;
      box.appendChild(card);

      const textEl=card.querySelector(".text");
      const stateEl=card.querySelector(".state");
      const whatEl=card.querySelector(".what");

      // state cycle
      stateEl.addEventListener("click",()=>{ if(recentLong())return; cycleState(i); });
      stateEl.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); cycleState(i); } });

      // text: tap to edit, long-press to delete the whole worry
      onLongPress(textEl, ()=>deleteWorry(i));
      textEl.addEventListener("click",()=>{ if(recentLong())return; editInline(textEl, data.worries[i].text, v=>{ if(v){ data.worries[i].text=v; save(); } }); });

      // action: tap to edit the real action (even while resting, you can pre-write it)
      whatEl.addEventListener("click",()=>{ if(recentLong())return; editInline(whatEl, data.worries[i].act||"", v=>{ data.worries[i].act=v; save(); }); });
    });
  }
  function cycleState(i){
    const w=data.worries[i]; if(!w) return;
    const next=STATES[(STATES.indexOf(w.state)+1)%3];
    // constellation joining (persisted): stamp the moment it settled, clear when it leaves
    if(next==="settled") w.settledAt=Date.now();
    else w.settledAt=null;
    w.state=next;
    save(); renderAll();
  }
  function deleteWorry(i){
    const w=data.worries[i]; if(!w) return;
    const label=w.text.length>18 ? w.text.slice(0,18)+"…" : (w.text||"この悩み");
    if(confirm("「"+label+"」を削除する？")){ data.worries.splice(i,1); save(); renderAll(); }
  }
  function addWorry(){
    const inp=document.getElementById("newWorry");
    const t=inp.value.trim(); if(!t) return;
    // pick up any categories chosen in the add bar (kept in CATS order)
    const cats=CATS.filter(c=>pickedCats.has(c));
    // thrown in raw: no action yet → lands as 寝かせ中 (holding), not a failure
    data.worries.unshift({text:t, state:"rest", act:"", cats, settledAt:null});
    inp.value="";
    clearPickedCats();
    filter="all";
    document.querySelectorAll(".lens .chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.cat==="all"));
    save(); renderWorries();
  }
  function clearPickedCats(){
    pickedCats.clear();
    document.querySelectorAll(".cat-pick").forEach(b=>b.setAttribute("aria-pressed","false"));
  }

  // ── render: foundation (night constellation) ──
  function renderFoundation(){
    // "最近、星座に加わった" — all settled worries, newest first (by settledAt). derived & persisted
    const settled=data.worries
      .filter(w=>w.state==="settled")
      .sort((a,b)=>(b.settledAt||0)-(a.settledAt||0));
    const jw=document.getElementById("joinedWrap");
    if(settled.length){
      let h='<div class="sky-sub">最近、星座に加わった</div><ul class="starlist">';
      settled.forEach(w=>{
        h+=`<li class="srow fresh"><span class="sg">${starSvg(false)}</span><span class="sn">${escapeHtml(w.text)}</span></li>`;
      });
      h+='</ul><div class="divider"></div>';
      jw.innerHTML=h;
    }else{
      jw.innerHTML="";
    }

    const ul=document.getElementById("foundation");
    ul.innerHTML="";
    data.foundation.forEach((t,i)=>{
      const bright=/一等星/.test(t);   // 一等星の孤独だけ大きい星（表示のみ）
      const li=document.createElement("li");
      li.className="srow"+(bright?" bright":"");
      li.innerHTML=`<span class="sg">${starSvg(bright)}</span><span class="sn">${escapeHtml(t)}</span>`;
      ul.appendChild(li);
      onLongPress(li, ()=>deleteFoundation(i));
    });
  }
  function deleteFoundation(i){
    const t=data.foundation[i]; if(t===undefined) return;
    // achievements aren't meant to be erased casually — make it deliberate
    if(confirm("この積み上げを消す？\n\n「"+t+"」\n\n達成の記録だよ。")){ data.foundation.splice(i,1); save(); renderFoundation(); }
  }
  function addFoundation(){
    const inp=document.getElementById("newFound");
    const t=inp.value.trim(); if(!t) return;
    data.foundation.push(t);
    inp.value="";
    save(); renderFoundation();
  }

  function renderAll(){ renderCompass(); renderWorries(); renderFoundation(); }

  // ── export / import ──
  function ymd(){
    const t=new Date();
    return ""+t.getFullYear()+String(t.getMonth()+1).padStart(2,"0")+String(t.getDate()).padStart(2,"0");
  }
  function exportData(){
    const payload={version:1, compass:data.compass, worries:data.worries, foundation:data.foundation};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="loop-dashboard-backup-"+ymd()+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  function importData(file){
    const reader=new FileReader();
    reader.onload=()=>{
      let parsed;
      try{ parsed=JSON.parse(reader.result); }
      catch(e){ alert("読み込めなかった。JSON ファイルか確認してね。"); return; }
      if(!parsed || parsed.version!==1){
        if(!confirm("バージョン情報が違うみたい。それでも読み込んで置き換える？")) return;
      }else{
        if(!confirm("読み込むと、いまの内容はすべて置き換わります。続けますか？")) return;
      }
      data=normalize(parsed);
      filter="all";
      clearPickedCats();
      document.querySelectorAll(".lens .chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.cat==="all"));
      save(); renderAll();
    };
    reader.readAsText(file);
  }

  // ── wiring ──
  document.getElementById("addBtn").addEventListener("click",addWorry);
  document.getElementById("newWorry").addEventListener("keydown",e=>{ if(e.key==="Enter") addWorry(); });

  document.getElementById("compassAdd").addEventListener("click",addCompass);

  document.getElementById("foundAddBtn").addEventListener("click",addFoundation);
  document.getElementById("newFound").addEventListener("keydown",e=>{ if(e.key==="Enter") addFoundation(); });

  document.getElementById("lens").addEventListener("click",e=>{
    const b=e.target.closest(".chip"); if(!b) return;
    filter=b.dataset.cat;
    document.querySelectorAll(".lens .chip").forEach(c=>c.setAttribute("aria-pressed", c===b));
    renderWorries();
  });

  document.getElementById("addCats").addEventListener("click",e=>{
    const b=e.target.closest(".cat-pick"); if(!b) return;
    const c=b.dataset.cat;
    if(pickedCats.has(c)){ pickedCats.delete(c); b.setAttribute("aria-pressed","false"); }
    else{ pickedCats.add(c); b.setAttribute("aria-pressed","true"); }
  });

  document.getElementById("exportBtn").addEventListener("click",exportData);
  document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change",function(){
    if(this.files && this.files[0]) importData(this.files[0]);
    this.value="";  // allow re-importing the same file later
  });

  renderAll();
</script>
</body>
</html>
